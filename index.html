<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intel Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0e10;
  --surface: #14161a;
  --surface2: #1c1f26;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text: #ece9e3;
  --muted: #6e7280;
  --faint: #32353e;
  --accent: #c9a96e;
  --c-finance: #6e9ec8; --c-finance-bg: rgba(110,158,200,0.09);
  --c-tech:    #7ec87a; --c-tech-bg:    rgba(126,200,122,0.09);
  --c-startup: #c87ab0; --c-startup-bg: rgba(200,122,176,0.09);
  --c-auto:    #c9a96e; --c-auto-bg:    rgba(201,169,110,0.09);
  --c-macro:   #c87a6e; --c-macro-bg:   rgba(200,122,110,0.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

.masthead {
  position: sticky; top: 0; z-index: 200;
  background: rgba(13,14,16,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 18px 48px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.logo { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; color: var(--text); }
.logo em { font-style: italic; color: var(--accent); }
.masthead-center { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
.masthead-right { display: flex; align-items: center; gap: 14px; }
.update-time { font-size: 11px; color: var(--faint); }
.btn-refresh {
  background: transparent; border: 1px solid var(--border2);
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: all 0.2s;
}
.btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
.btn-refresh.loading .spin { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.tabs {
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 0 48px; display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 13px 18px 11px; cursor: pointer; white-space: nowrap;
  transition: all 0.18s; position: relative; top: 1px;
  display: flex; align-items: center; gap: 7px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; opacity: 0.75; }
.tab-count {
  font-size: 10px; padding: 1px 6px; border-radius: 8px;
  background: var(--surface2); color: var(--muted); min-width: 20px; text-align: center;
}
.tab.active .tab-count { background: rgba(201,169,110,0.15); color: var(--accent); }

.layout { display: grid; grid-template-columns: 1fr 300px; min-height: calc(100vh - 105px); }
.feed { padding: 32px 48px; border-right: 1px solid var(--border); }
.feed-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
.feed-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
.feed-total { font-size: 11px; color: var(--faint); }

.article {
  display: grid; grid-template-columns: 1fr auto; gap: 20px;
  padding: 20px 0; border-bottom: 1px solid var(--border);
  text-decoration: none; cursor: pointer; transition: border-color 0.15s;
}
.article:last-child { border-bottom: none; }
.article:hover .art-title { color: var(--accent); }
.art-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.art-source { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.art-bull { color: var(--faint); font-size: 10px; }
.art-time { font-size: 11px; color: var(--faint); }
.art-title {
  font-family: 'DM Serif Display', serif; font-size: 17px;
  line-height: 1.42; color: var(--text); transition: color 0.15s; margin-bottom: 7px;
}
.art-desc {
  font-size: 13px; color: var(--muted); line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.art-tag {
  font-size: 10px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 10px; white-space: nowrap; align-self: start; margin-top: 6px;
}

.sidebar { padding: 28px 24px; }
.sb-section { margin-bottom: 28px; }
.sb-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); margin-bottom: 14px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.stat-num { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }
.src-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
.src-item:last-child { border-bottom: none; }
.src-name { font-size: 12px; color: var(--muted); }
.src-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c-tech); opacity: 0.5; }
.src-dot.err { background: var(--c-macro); opacity: 0.8; }
.src-dot.loading { background: var(--accent); opacity: 0.5; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }

.skel-wrap { padding: 20px 0; border-bottom: 1px solid var(--border); }
.sk { background: var(--surface2); border-radius: 3px; animation: shimmer 1.4s ease-in-out infinite; }
@keyframes shimmer { 0%,100%{opacity:.35} 50%{opacity:.65} }
.sk-sm { height: 10px; width: 28%; margin-bottom: 10px; }
.sk-t1 { height: 19px; width: 80%; margin-bottom: 6px; }
.sk-t2 { height: 19px; width: 55%; margin-bottom: 10px; }
.sk-b1 { height: 12px; width: 92%; margin-bottom: 5px; }
.sk-b2 { height: 12px; width: 65%; }

.empty { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; line-height: 1.8; }

@media (max-width: 960px) {
  .masthead, .tabs, .feed { padding-left: 20px; padding-right: 20px; }
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .feed { border-right: none; }
}
</style>
</head>
<body>

<header class="masthead">
  <div class="logo">Intel <em>Hub</em></div>
  <div class="masthead-center" id="dateLabel"></div>
  <div class="masthead-right">
    <span class="update-time" id="updateTime"></span>
    <button class="btn-refresh" id="refreshBtn" onclick="loadAll()">
      <svg class="spin" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Aggiorna
    </button>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" onclick="setTab('all',this)"><span class="tab-dot" style="background:var(--accent)"></span>Tutti<span class="tab-count" id="tc-all">—</span></button>
  <button class="tab" onclick="setTab('finance',this)"><span class="tab-dot" style="background:var(--c-finance)"></span>Finance &amp; Markets<span class="tab-count" id="tc-finance">—</span></button>
  <button class="tab" onclick="setTab('tech',this)"><span class="tab-dot" style="background:var(--c-tech)"></span>Tech &amp; AI<span class="tab-count" id="tc-tech">—</span></button>
  <button class="tab" onclick="setTab('startup',this)"><span class="tab-dot" style="background:var(--c-startup)"></span>Startup &amp; VC<span class="tab-count" id="tc-startup">—</span></button>
  <button class="tab" onclick="setTab('auto',this)"><span class="tab-dot" style="background:var(--c-auto)"></span>Automotive<span class="tab-count" id="tc-auto">—</span></button>
  <button class="tab" onclick="setTab('macro',this)"><span class="tab-dot" style="background:var(--c-macro)"></span>Macro<span class="tab-count" id="tc-macro">—</span></button>
</nav>

<div class="layout">
  <main class="feed">
    <div class="feed-header">
      <span class="feed-label" id="feedLabel">Tutti i feed</span>
      <span class="feed-total" id="feedTotal"></span>
    </div>
    <div id="articlesList"></div>
  </main>
  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-title">Statistiche</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" id="st-total">—</div><div class="stat-lbl">Articoli</div></div>
        <div class="stat-box"><div class="stat-num" id="st-sources">—</div><div class="stat-lbl">Fonti attive</div></div>
        <div class="stat-box"><div class="stat-num" id="st-today">—</div><div class="stat-lbl">Oggi</div></div>
        <div class="stat-box"><div class="stat-num">5</div><div class="stat-lbl">Categorie</div></div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-title">Fonti monitorate</div>
      <div id="sourcesList"></div>
    </div>
  </aside>
</div>

<script>
// ── FEEDS ─────────────────────────────────────────────────────────────────
const FEEDS = [
  // Finance
  { id:'reuters-biz',   label:'Reuters Business',    cat:'finance', url:'https://feeds.reuters.com/reuters/businessNews' },
  { id:'cnbc-fin',      label:'CNBC Finance',         cat:'finance', url:'https://www.cnbc.com/id/10000664/device/rss/rss.html' },
  { id:'marketwatch',   label:'MarketWatch',          cat:'finance', url:'https://feeds.content.dowjones.io/public/rss/mw_realtimeheadlines' },
  { id:'investing',     label:'Investing.com',        cat:'finance', url:'https://www.investing.com/rss/news.rss' },
  // Tech
  { id:'techcrunch',    label:'TechCrunch',           cat:'tech',    url:'https://techcrunch.com/feed/' },
  { id:'ars',           label:'Ars Technica',         cat:'tech',    url:'https://feeds.arstechnica.com/arstechnica/index' },
  { id:'verge',         label:'The Verge',            cat:'tech',    url:'https://www.theverge.com/rss/index.xml' },
  { id:'wired',         label:'Wired',                cat:'tech',    url:'https://www.wired.com/feed/rss' },
  { id:'mit',           label:'MIT Tech Review',      cat:'tech',    url:'https://www.technologyreview.com/topnews.rss' },
  // Startup
  { id:'crunchbase',    label:'Crunchbase News',      cat:'startup', url:'https://news.crunchbase.com/feed/' },
  { id:'vb',            label:'VentureBeat',          cat:'startup', url:'https://venturebeat.com/feed/' },
  { id:'sifted',        label:'Sifted EU',            cat:'startup', url:'https://sifted.eu/feed' },
  { id:'eu-startups',   label:'EU-Startups',          cat:'startup', url:'https://www.eu-startups.com/feed/' },
  // Auto
  { id:'autosport',     label:'Autosport F1',         cat:'auto',    url:'https://www.autosport.com/rss/feed/f1' },
  { id:'therace',       label:'The Race',             cat:'auto',    url:'https://the-race.com/feed/' },
  { id:'motorsport',    label:'Motorsport.com',       cat:'auto',    url:'https://www.motorsport.com/rss/f1/news/' },
  { id:'electrek',      label:'Electrek',             cat:'auto',    url:'https://electrek.co/feed/' },
  { id:'insideevs',     label:'InsideEVs',            cat:'auto',    url:'https://insideevs.com/feed/' },
  // Macro
  { id:'reuters-world', label:'Reuters World',        cat:'macro',   url:'https://feeds.reuters.com/Reuters/worldNews' },
  { id:'bbc-biz',       label:'BBC Business',         cat:'macro',   url:'https://feeds.bbci.co.uk/news/business/rss.xml' },
  { id:'economist',     label:'The Economist',        cat:'macro',   url:'https://www.economist.com/finance-and-economics/rss.xml' },
  { id:'fp',            label:'Foreign Policy',       cat:'macro',   url:'https://foreignpolicy.com/feed/' },
];

const CAT = {
  finance: { label:'Finance & Markets', color:'var(--c-finance)', bg:'var(--c-finance-bg)' },
  tech:    { label:'Tech & AI',         color:'var(--c-tech)',    bg:'var(--c-tech-bg)'    },
  startup: { label:'Startup & VC',      color:'var(--c-startup)', bg:'var(--c-startup-bg)' },
  auto:    { label:'Automotive',        color:'var(--c-auto)',    bg:'var(--c-auto-bg)'    },
  macro:   { label:'Macro',            color:'var(--c-macro)',   bg:'var(--c-macro-bg)'   },
};

// Multiple proxies — try each in order until one works
const PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.rss2json.com/v1/api.json?count=20&rss_url=${encodeURIComponent(url)}`,
];

let articles = [];
let currentTab = 'all';
let srcStatus = {};

// ── INIT ─────────────────────────────────────────────────────────────────
(function init() {
  const d = new Date();
  document.getElementById('dateLabel').textContent =
    d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase();
  loadAll();
})();

function setTab(cat, el) {
  currentTab = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderFeed();
}

// ── FETCH with multi-proxy fallback ─────────────────────────────────────
async function fetchFeed(feed) {
  for (let i = 0; i < PROXIES.length; i++) {
    try {
      const proxyUrl = PROXIES[i](feed.url);
      const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(9000) });
      if (!r.ok) continue;

      // rss2json returns JSON directly
      if (i === 2) {
        const d = await r.json();
        if (d.status !== 'ok' || !Array.isArray(d.items)) continue;
        srcStatus[feed.id] = 'ok';
        return d.items.map(item => itemFromRss2json(item, feed));
      }

      // allorigins / corsproxy return raw XML in .contents
      const d = await r.json();
      const xml = d.contents || d;
      if (!xml || typeof xml !== 'string') continue;
      const items = parseXML(xml, feed);
      if (!items.length) continue;
      srcStatus[feed.id] = 'ok';
      return items;
    } catch { continue; }
  }
  srcStatus[feed.id] = 'err';
  return [];
}

function itemFromRss2json(item, feed) {
  return {
    title:  (item.title || '').trim(),
    link:   item.link || item.guid || '#',
    desc:   item.description || item.content || '',
    date:   item.pubDate || '',
    source: feed.label,
    cat:    feed.cat,
  };
}

function parseXML(xml, feed) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const items = Array.from(doc.querySelectorAll('item, entry'));
    return items.slice(0, 20).map(el => {
      const get = (tag) => el.querySelector(tag)?.textContent?.trim() || '';
      const link = el.querySelector('link')?.getAttribute('href') ||
                   el.querySelector('link')?.textContent?.trim() || '#';
      return {
        title:  get('title'),
        link:   link,
        desc:   get('description') || get('summary') || get('content'),
        date:   get('pubDate') || get('published') || get('updated') || '',
        source: feed.label,
        cat:    feed.cat,
      };
    }).filter(a => a.title);
  } catch { return []; }
}

// ── LOAD ALL ─────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  articles = [];
  srcStatus = {};
  renderSources(true);
  renderSkeletons();

  // Batches of 5
  for (let i = 0; i < FEEDS.length; i += 5) {
    const batch = FEEDS.slice(i, i + 5);
    const results = await Promise.allSettled(batch.map(fetchFeed));
    results.forEach(r => { if (r.status === 'fulfilled') articles.push(...r.value); });
    processAndRender();
    renderSources(false);
  }

  btn.classList.remove('loading');
  document.getElementById('updateTime').textContent =
    'Agg. ' + new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

function processAndRender() {
  const seen = new Set();
  articles = articles.filter(a => {
    const k = a.title.toLowerCase().replace(/\W/g,'').slice(0,50);
    if (!k || seen.has(k)) return false;
    seen.add(k); return true;
  });
  articles.sort((a,b) => new Date(b.date) - new Date(a.date));
  updateCounts();
  renderFeed();
}

function updateCounts() {
  ['finance','tech','startup','auto','macro'].forEach(c =>
    document.getElementById('tc-'+c).textContent = articles.filter(a=>a.cat===c).length
  );
  document.getElementById('tc-all').textContent = articles.length;
  const today = new Date(); today.setHours(0,0,0,0);
  document.getElementById('st-total').textContent   = articles.length;
  document.getElementById('st-sources').textContent = Object.values(srcStatus).filter(s=>s==='ok').length;
  document.getElementById('st-today').textContent   = articles.filter(a=>new Date(a.date)>=today).length;
}

function renderFeed() {
  const list     = document.getElementById('articlesList');
  const filtered = currentTab === 'all' ? articles : articles.filter(a=>a.cat===currentTab);
  document.getElementById('feedLabel').textContent  = currentTab==='all' ? 'Tutti i feed' : (CAT[currentTab]?.label||'');
  document.getElementById('feedTotal').textContent  = filtered.length + ' articoli';

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">I feed si stanno caricando…<br>Se il problema persiste clicca Aggiorna.</div>';
    return;
  }
  list.innerHTML = filtered.map(a => {
    const m = CAT[a.cat]||{};
    return `<a class="article" href="${esc(a.link)}" target="_blank" rel="noopener">
  <div class="art-body">
    <div class="art-meta">
      <span class="art-source">${esc(a.source)}</span>
      ${timeAgo(a.date) ? `<span class="art-bull">·</span><span class="art-time">${timeAgo(a.date)}</span>` : ''}
    </div>
    <div class="art-title">${esc(a.title)}</div>
    ${a.desc ? `<div class="art-desc">${esc(strip(a.desc).slice(0,200))}</div>` : ''}
  </div>
  <span class="art-tag" style="color:${m.color};background:${m.bg}">${m.label||a.cat}</span>
</a>`;
  }).join('');
}

function renderSources(loading) {
  document.getElementById('sourcesList').innerHTML = FEEDS.map(f =>
    `<div class="src-item"><span class="src-name">${f.label}</span>
     <span class="src-dot ${loading?'loading':srcStatus[f.id]==='err'?'err':''}"></span></div>`
  ).join('');
}

function renderSkeletons() {
  document.getElementById('articlesList').innerHTML = Array(7).fill('').map(()=>`
    <div class="skel-wrap">
      <div class="sk sk-sm"></div><div class="sk sk-t1"></div>
      <div class="sk sk-t2"></div><div class="sk sk-b1"></div><div class="sk sk-b2"></div>
    </div>`).join('');
}

function timeAgo(s) {
  if (!s) return '';
  const d = new Date(s); if (isNaN(d)) return '';
  const m = Math.floor((Date.now()-d)/60000);
  if (m<2) return 'adesso'; if (m<60) return m+'m fa';
  if (m<1440) return Math.floor(m/60)+'h fa'; return Math.floor(m/1440)+'g fa';
}
function strip(s){ return (s||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intel Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0e10;
  --surface: #14161a;
  --surface2: #1c1f26;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text: #ece9e3;
  --muted: #6e7280;
  --faint: #32353e;
  --accent: #c9a96e;
  --c-finance: #6e9ec8; --c-finance-bg: rgba(110,158,200,0.09);
  --c-tech:    #7ec87a; --c-tech-bg:    rgba(126,200,122,0.09);
  --c-startup: #c87ab0; --c-startup-bg: rgba(200,122,176,0.09);
  --c-auto:    #c9a96e; --c-auto-bg:    rgba(201,169,110,0.09);
  --c-macro:   #c87a6e; --c-macro-bg:   rgba(200,122,110,0.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

/* ── MASTHEAD ── */
.masthead {
  position: sticky; top: 0; z-index: 200;
  background: rgba(13,14,16,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 20px 48px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.logo { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; letter-spacing: -0.3px; color: var(--text); }
.logo em { font-style: italic; color: var(--accent); }
.masthead-center { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
.masthead-right { display: flex; align-items: center; gap: 14px; }
.update-time { font-size: 11px; color: var(--faint); }
.btn-refresh {
  background: transparent; border: 1px solid var(--border2);
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400;
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: all 0.2s; letter-spacing: 0.02em;
}
.btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
.btn-refresh.loading .spin { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TABS ── */
.tabs {
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 0 48px; display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400;
  padding: 13px 18px 11px; cursor: pointer; white-space: nowrap;
  transition: all 0.18s; letter-spacing: 0.02em; position: relative; top: 1px;
  display: flex; align-items: center; gap: 7px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; opacity: 0.75; }
.tab-count {
  font-size: 10px; padding: 1px 6px; border-radius: 8px;
  background: var(--surface2); color: var(--muted); min-width: 20px; text-align: center;
}
.tab.active .tab-count { background: rgba(201,169,110,0.15); color: var(--accent); }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 1fr 300px; min-height: calc(100vh - 105px); }

/* ── FEED ── */
.feed { padding: 32px 48px; border-right: 1px solid var(--border); }
.feed-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
.feed-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
.feed-total { font-size: 11px; color: var(--faint); }

/* ── ARTICLE ── */
.article {
  display: grid; grid-template-columns: 1fr auto; gap: 20px;
  padding: 20px 0; border-bottom: 1px solid var(--border);
  text-decoration: none; cursor: pointer; transition: border-color 0.15s;
}
.article:last-child { border-bottom: none; }
.article:hover .art-title { color: var(--accent); }
.art-body {}
.art-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.art-source { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.art-bull { color: var(--faint); font-size: 10px; }
.art-time { font-size: 11px; color: var(--faint); }
.art-title {
  font-family: 'DM Serif Display', serif; font-size: 17px; font-weight: 400;
  line-height: 1.42; color: var(--text); transition: color 0.15s; margin-bottom: 7px;
}
.art-desc {
  font-size: 13px; color: var(--muted); line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.art-tag {
  font-size: 10px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 10px; white-space: nowrap; align-self: start; margin-top: 6px;
}

/* ── SIDEBAR ── */
.sidebar { padding: 28px 24px; position: sticky; top: 105px; height: fit-content; }
.sb-section { margin-bottom: 28px; }
.sb-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); margin-bottom: 14px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.stat-num { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 0.03em; }
.src-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
.src-item:last-child { border-bottom: none; }
.src-name { font-size: 12px; color: var(--muted); }
.src-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c-tech); opacity: 0.5; flex-shrink: 0; }
.src-dot.err { background: var(--c-macro); opacity: 0.7; }
.src-dot.loading { background: var(--accent); opacity: 0.5; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }

/* ── SKELETON ── */
.skel-wrap { padding: 20px 0; border-bottom: 1px solid var(--border); }
.sk { background: var(--surface2); border-radius: 3px; animation: shimmer 1.4s ease-in-out infinite; }
@keyframes shimmer { 0%,100%{opacity:.35} 50%{opacity:.65} }
.sk-sm { height: 10px; width: 28%; margin-bottom: 10px; }
.sk-title { height: 19px; width: 80%; margin-bottom: 8px; }
.sk-title2 { height: 19px; width: 55%; margin-bottom: 10px; }
.sk-body { height: 12px; width: 92%; margin-bottom: 5px; }
.sk-body2 { height: 12px; width: 65%; }

/* ── EMPTY / ERROR ── */
.empty { text-align: center; padding: 60px 24px; }
.empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }
.empty-text { font-size: 14px; color: var(--muted); line-height: 1.8; }

/* ── RESPONSIVE ── */
@media (max-width: 960px) {
  .masthead, .tabs, .feed { padding-left: 20px; padding-right: 20px; }
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .feed { border-right: none; }
}
</style>
</head>
<body>

<header class="masthead">
  <div class="logo">Intel <em>Hub</em></div>
  <div class="masthead-center" id="dateLabel"></div>
  <div class="masthead-right">
    <span class="update-time" id="updateTime"></span>
    <button class="btn-refresh" id="refreshBtn" onclick="loadAll()">
      <svg class="spin" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Aggiorna
    </button>
  </div>
</header>

<nav class="tabs" id="tabsBar">
  <button class="tab active" onclick="setTab('all',this)">
    <span class="tab-dot" style="background:var(--accent)"></span>Tutti<span class="tab-count" id="tc-all">—</span>
  </button>
  <button class="tab" onclick="setTab('finance',this)">
    <span class="tab-dot" style="background:var(--c-finance)"></span>Finance &amp; Markets<span class="tab-count" id="tc-finance">—</span>
  </button>
  <button class="tab" onclick="setTab('tech',this)">
    <span class="tab-dot" style="background:var(--c-tech)"></span>Tech &amp; AI<span class="tab-count" id="tc-tech">—</span>
  </button>
  <button class="tab" onclick="setTab('startup',this)">
    <span class="tab-dot" style="background:var(--c-startup)"></span>Startup &amp; VC<span class="tab-count" id="tc-startup">—</span>
  </button>
  <button class="tab" onclick="setTab('auto',this)">
    <span class="tab-dot" style="background:var(--c-auto)"></span>Automotive<span class="tab-count" id="tc-auto">—</span>
  </button>
  <button class="tab" onclick="setTab('macro',this)">
    <span class="tab-dot" style="background:var(--c-macro)"></span>Macro<span class="tab-count" id="tc-macro">—</span>
  </button>
</nav>

<div class="layout">
  <main class="feed">
    <div class="feed-header">
      <span class="feed-label" id="feedLabel">Tutti i feed</span>
      <span class="feed-total" id="feedTotal"></span>
    </div>
    <div id="articlesList"></div>
  </main>

  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-title">Statistiche</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" id="st-total">—</div><div class="stat-lbl">Articoli</div></div>
        <div class="stat-box"><div class="stat-num" id="st-sources">—</div><div class="stat-lbl">Fonti attive</div></div>
        <div class="stat-box"><div class="stat-num" id="st-today">—</div><div class="stat-lbl">Oggi</div></div>
        <div class="stat-box"><div class="stat-num">5</div><div class="stat-lbl">Categorie</div></div>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-title">Fonti monitorate</div>
      <div id="sourcesList"></div>
    </div>
  </aside>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const PROXY  = 'https://api.rss2json.com/v1/api.json?count=20&rss_url=';
const PROXY2 = 'https://rss2json.com/api.json?count=20&rss_url=';

const FEEDS = [
  // FINANCE & MARKETS
  { id:'reuters-biz',    label:'Reuters Business',   cat:'finance', url:'https://feeds.reuters.com/reuters/businessNews' },
  { id:'wsj-markets',    label:'WSJ Markets',         cat:'finance', url:'https://feeds.content.dowjones.io/public/rss/mw_marketpulse' },
  { id:'cnbc-finance',   label:'CNBC Finance',        cat:'finance', url:'https://www.cnbc.com/id/10000664/device/rss/rss.html' },
  { id:'ft-markets',     label:'FT Markets',          cat:'finance', url:'https://www.ft.com/rss/home/uk' },
  { id:'seeking-alpha',  label:'Seeking Alpha',       cat:'finance', url:'https://seekingalpha.com/feed.xml' },
  { id:'marketwatch',    label:'MarketWatch',         cat:'finance', url:'https://feeds.content.dowjones.io/public/rss/mw_realtimeheadlines' },

  // TECH & AI
  { id:'techcrunch',     label:'TechCrunch',          cat:'tech',    url:'https://techcrunch.com/feed/' },
  { id:'ars-technica',   label:'Ars Technica',        cat:'tech',    url:'https://feeds.arstechnica.com/arstechnica/index' },
  { id:'the-verge',      label:'The Verge',           cat:'tech',    url:'https://www.theverge.com/rss/index.xml' },
  { id:'wired',          label:'Wired',               cat:'tech',    url:'https://www.wired.com/feed/rss' },
  { id:'mit-tech',       label:'MIT Tech Review',     cat:'tech',    url:'https://www.technologyreview.com/topnews.rss' },
  { id:'venturebeat-ai', label:'VentureBeat AI',      cat:'tech',    url:'https://venturebeat.com/category/ai/feed/' },

  // STARTUP & VC
  { id:'crunchbase',     label:'Crunchbase News',     cat:'startup', url:'https://news.crunchbase.com/feed/' },
  { id:'venturebeat',    label:'VentureBeat',         cat:'startup', url:'https://feeds.feedburner.com/venturebeat/SZYF' },
  { id:'tc-startups',    label:'TechCrunch Startups', cat:'startup', url:'https://techcrunch.com/category/startups/feed/' },
  { id:'sifted',         label:'Sifted (EU startups)',cat:'startup', url:'https://sifted.eu/feed' },
  { id:'eu-startups',    label:'EU-Startups',         cat:'startup', url:'https://www.eu-startups.com/feed/' },

  // AUTOMOTIVE & MOTORSPORT
  { id:'autosport-f1',   label:'Autosport F1',        cat:'auto',    url:'https://www.autosport.com/rss/feed/f1' },
  { id:'the-race',       label:'The Race',            cat:'auto',    url:'https://the-race.com/feed/' },
  { id:'motorsport',     label:'Motorsport.com',      cat:'auto',    url:'https://www.motorsport.com/rss/f1/news/' },
  { id:'electrek',       label:'Electrek (EV)',       cat:'auto',    url:'https://electrek.co/feed/' },
  { id:'insideevs',      label:'InsideEVs',           cat:'auto',    url:'https://insideevs.com/feed/' },
  { id:'pitpass',        label:'Pitpass F1',          cat:'auto',    url:'https://www.pitpass.com/fes_php/fes_usr_sit_newsfeed.php' },

  // MACRO & GEOPOLITICS
  { id:'reuters-world',  label:'Reuters World',       cat:'macro',   url:'https://feeds.reuters.com/Reuters/worldNews' },
  { id:'bbc-biz',        label:'BBC Business',        cat:'macro',   url:'https://feeds.bbci.co.uk/news/business/rss.xml' },
  { id:'economist',      label:'The Economist',       cat:'macro',   url:'https://www.economist.com/finance-and-economics/rss.xml' },
  { id:'ft-world',       label:'FT World',            cat:'macro',   url:'https://www.ft.com/world?format=rss' },
  { id:'foreign-pol',    label:'Foreign Policy',      cat:'macro',   url:'https://foreignpolicy.com/feed/' },
  { id:'project-synd',   label:'Project Syndicate',   cat:'macro',   url:'https://www.project-syndicate.org/rss' },
];

const CAT = {
  finance: { label:'Finance & Markets', color:'var(--c-finance)', bg:'var(--c-finance-bg)' },
  tech:    { label:'Tech & AI',         color:'var(--c-tech)',    bg:'var(--c-tech-bg)'    },
  startup: { label:'Startup & VC',      color:'var(--c-startup)', bg:'var(--c-startup-bg)' },
  auto:    { label:'Automotive',         color:'var(--c-auto)',   bg:'var(--c-auto-bg)'    },
  macro:   { label:'Macro',             color:'var(--c-macro)',   bg:'var(--c-macro-bg)'   },
};

// ── STATE ───────────────────────────────────────────────────────────────────
let articles = [];
let currentTab = 'all';
let srcStatus  = {};

// ── INIT ────────────────────────────────────────────────────────────────────
(function init() {
  const d = new Date();
  document.getElementById('dateLabel').textContent =
    d.toLocaleDateString('it-IT',{ weekday:'long', day:'numeric', month:'long', year:'numeric' }).toUpperCase();
  loadAll();
})();

// ── TAB ─────────────────────────────────────────────────────────────────────
function setTab(cat, el) {
  currentTab = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderFeed();
}

// ── FETCH ───────────────────────────────────────────────────────────────────
async function fetchFeed(feed) {
  const u = PROXY + encodeURIComponent(feed.url);
  try {
    const r = await fetch(u, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) throw new Error('http');
    const d = await r.json();
    if (d.status !== 'ok' || !Array.isArray(d.items)) throw new Error('parse');
    srcStatus[feed.id] = 'ok';
    return d.items.map(i => ({
      title:   (i.title || '').trim(),
      link:    i.link || i.guid || '#',
      desc:    i.description || i.content || '',
      date:    i.pubDate || '',
      source:  feed.label,
      cat:     feed.cat,
    }));
  } catch {
    srcStatus[feed.id] = 'err';
    return [];
  }
}

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  articles = [];
  srcStatus = {};
  renderSources(true);
  renderSkeletons();

  // Batch: 6 concurrent at a time
  for (let i = 0; i < FEEDS.length; i += 6) {
    const batch = FEEDS.slice(i, i + 6);
    const results = await Promise.allSettled(batch.map(fetchFeed));
    results.forEach((r,idx) => {
      if (r.status === 'fulfilled') articles.push(...r.value);
    });
    // Progressive render
    processAndRender();
    renderSources(false);
  }

  btn.classList.remove('loading');
  document.getElementById('updateTime').textContent =
    'Agg. ' + new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

// ── PROCESS ─────────────────────────────────────────────────────────────────
function processAndRender() {
  // Deduplicate
  const seen = new Set();
  let deduped = articles.filter(a => {
    const k = a.title.toLowerCase().replace(/\W/g,'').slice(0,50);
    if (!k || seen.has(k)) return false;
    seen.add(k); return true;
  });
  // Sort newest first
  deduped.sort((a,b) => new Date(b.date) - new Date(a.date));
  articles = deduped;
  updateCounts();
  renderFeed();
}

// ── COUNTS ──────────────────────────────────────────────────────────────────
function updateCounts() {
  const cats = ['finance','tech','startup','auto','macro'];
  document.getElementById('tc-all').textContent = articles.length;
  cats.forEach(c => {
    document.getElementById('tc-' + c).textContent = articles.filter(a => a.cat === c).length;
  });

  const today = new Date(); today.setHours(0,0,0,0);
  const todayN = articles.filter(a => new Date(a.date) >= today).length;
  document.getElementById('st-total').textContent   = articles.length;
  document.getElementById('st-sources').textContent = Object.values(srcStatus).filter(s => s==='ok').length;
  document.getElementById('st-today').textContent   = todayN;
}

// ── RENDER FEED ─────────────────────────────────────────────────────────────
function renderFeed() {
  const list  = document.getElementById('articlesList');
  const label = document.getElementById('feedLabel');
  const total = document.getElementById('feedTotal');

  const filtered = currentTab === 'all' ? articles : articles.filter(a => a.cat === currentTab);
  label.textContent = currentTab === 'all' ? 'Tutti i feed' : (CAT[currentTab]?.label || '');
  total.textContent = filtered.length + ' articoli';

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">◌</div><div class="empty-text">Nessun articolo disponibile.<br>I feed si stanno caricando…</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(a => {
    const m   = CAT[a.cat] || {};
    const ago = timeAgo(a.date);
    const desc = stripHtml(a.desc);
    return `<a class="article" href="${escHtml(a.link)}" target="_blank" rel="noopener noreferrer">
  <div class="art-body">
    <div class="art-meta">
      <span class="art-source">${escHtml(a.source)}</span>
      ${ago ? `<span class="art-bull">·</span><span class="art-time">${ago}</span>` : ''}
    </div>
    <div class="art-title">${escHtml(a.title)}</div>
    ${desc ? `<div class="art-desc">${escHtml(desc.slice(0,220))}</div>` : ''}
  </div>
  <span class="art-tag" style="color:${m.color};background:${m.bg}">${m.label||a.cat}</span>
</a>`;
  }).join('');
}

// ── RENDER SOURCES ───────────────────────────────────────────────────────────
function renderSources(loading) {
  const el = document.getElementById('sourcesList');
  el.innerHTML = FEEDS.map(f => {
    const st = loading ? 'loading' : (srcStatus[f.id] === 'err' ? 'err' : '');
    return `<div class="src-item"><span class="src-name">${f.label}</span><span class="src-dot ${st}"></span></div>`;
  }).join('');
}

// ── SKELETON ─────────────────────────────────────────────────────────────────
function renderSkeletons() {
  document.getElementById('articlesList').innerHTML =
    Array(8).fill('').map(()=>`<div class="skel-wrap">
  <div class="sk sk-sm"></div>
  <div class="sk sk-title"></div>
  <div class="sk sk-title2"></div>
  <div class="sk sk-body"></div>
  <div class="sk sk-body2"></div>
</div>`).join('');
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function timeAgo(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return '';
  const m = Math.floor((Date.now()-d)/60000);
  if (m < 2)    return 'adesso';
  if (m < 60)   return m+'m fa';
  if (m < 1440) return Math.floor(m/60)+'h fa';
  return Math.floor(m/1440)+'g fa';
}

function stripHtml(s) {
  if (!s) return '';
  return s.replace(/<[^>]*>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g,' ')
    .replace(/\s+/g,' ').trim();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
